name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

permissions:
  contents: write

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install LLVM/Clang (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Run Tests
        run: cargo test --verbose

  release:
    name: Build & Release Binaries
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact_name: n0ne-linux
            asset_suffix: .tar.gz
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact_name: n0ne-macos
            asset_suffix: .tar.gz
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact_name: n0ne-windows
            asset_suffix: .zip
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install LLVM/Clang (Ubuntu)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y clang llvm

      - name: Build Release Binary
        run: cargo build --release --target ${{ matrix.target }} --bin n0ne

      - name: Package Binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          tar -czf ../../../${{ matrix.artifact_name }}${{ matrix.asset_suffix }} n0ne
          cd -

      - name: Package Binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          Compress-Archive -Path target/${{ matrix.target }}/release/n0ne.exe -DestinationPath ${{ matrix.artifact_name }}${{ matrix.asset_suffix }}

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_name }}${{ matrix.asset_suffix }}

  create-release:
    name: Create GitHub Release
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download Linux Artifact
        uses: actions/download-artifact@v4
        with:
          name: n0ne-linux
          path: ./

      - name: Download macOS Artifact
        uses: actions/download-artifact@v4
        with:
          name: n0ne-macos
          path: ./

      - name: Download Windows Artifact
        uses: actions/download-artifact@v4
        with:
          name: n0ne-windows
          path: ./

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            n0ne-linux.tar.gz
            n0ne-macos.tar.gz
            n0ne-windows.zip
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
